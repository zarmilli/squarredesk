<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Article</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

<style>
*,*::before,*::after{
box-sizing:border-box;
margin:0;
padding:0;
}

:root{
--primary:#B1E09D;
--secondary:#061C15;
--accent:#82A89C;
--bg:#ffffff;
--text:#111827;
--text2:#4B5563;
--white:#ffffff;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Poppins',sans-serif;
line-height:1.8;
}

.article-page{
padding:80px 48px;
}

.article-container{
max-width:850px;
margin:0 auto;
}

.back-link{
display:inline-flex;
align-items:center;
gap:10px;
margin-bottom:40px;

font-family:'Poppins',sans-serif;
font-size:12px;
font-weight:600;
letter-spacing:.08em;
text-transform:uppercase;

color:var(--secondary);
text-decoration:none;
}

.back-link:hover{
color:var(--accent);
}

.article-date{
font-family:'Poppins',sans-serif;
font-size:12px;
font-weight:600;
letter-spacing:.1em;
text-transform:uppercase;
color:var(--accent);
margin-bottom:18px;
}

.article-title{
font-family:'Plus Jakarta Sans',sans-serif;
font-size:clamp(38px,5vw,62px);
font-weight:700;
line-height:1.05;
letter-spacing:-.02em;
color:var(--secondary);
margin-bottom:32px;
}

.article-image{
overflow:hidden;
border-radius:24px;
margin-bottom:28px;
}

.article-image img{
width:100%;
display:block;
aspect-ratio:16/8;
object-fit:cover;
}

.article-description{
font-size:18px;
line-height:1.9;
color:var(--text2);
margin-bottom:36px;
}

.article-divider{
border:none;
border-top:1px solid rgba(6,28,21,.15);
margin-bottom:40px;
}

.article-content{
font-size:18px;
line-height:2;
color:var(--secondary);
white-space:pre-wrap;
}

@media(max-width:768px){

.article-page{
padding:48px 20px;
}

.article-title{
font-size:36px;
}

.article-description,
.article-content{
font-size:17px;
}
}
</style>
</head>

<body>

<section class="article-page">

<div class="article-container">

<a href="blog.html" class="back-link">
← Back to Blog
</a>

<div id="articleDate" class="article-date"></div>

<h1 id="articleTitle" class="article-title"></h1>

<div class="article-image">
<img id="articleImage" src="" alt="">
</div>

<p id="articleDescription" class="article-description"></p>

<hr class="article-divider">

<div id="articleContent" class="article-content"></div>

</div>

</section>

<script>
const params = new URLSearchParams(window.location.search);
const idParam = params.get("id");

function getArticle(param, articles) {

    if (!articles || !articles.length) return null;

    const index = Number(param);

    if (
        Number.isInteger(index) &&
        index >= 0 &&
        index < articles.length
    ) {
        return articles[index];
    }

    return articles.find(article =>
        String(article.id) === param ||
        String(article.article_id) === param ||
        String(article.slug) === param ||
        String(article.title) === param
    );
}

function renderArticle(article) {

    if (!article) return;

    document.title = article.title || document.title;

    document.getElementById("articleDate").textContent =
        article.date || "";

    document.getElementById("articleTitle").textContent =
        article.title || "";

    const image = document.getElementById("articleImage");

    if (article.image) {
        image.src = article.image;
    } else {
        image.removeAttribute("src");
    }

    document.getElementById("articleDescription").textContent =
        article.description || "";

    const content = document.getElementById("articleContent");

    if (
        typeof article.content === "string" &&
        /<\w+/.test(article.content)
    ) {
        content.innerHTML = article.content;
    } else {
        content.textContent = article.content || "";
    }
}

function loadArticle() {

    const articles = window.websiteData?.articles;

    if (!articles || !articles.length) {
        return false;
    }

    const article =
        getArticle(idParam, articles) || articles[0];

    renderArticle(article);

    return true;
}

// Try immediately
if (!loadArticle()) {

    // Wait until the editor injects websiteData
    const observer = new MutationObserver(() => {

        if (loadArticle()) {
            observer.disconnect();
        }

    });

    observer.observe(document.documentElement, {
        childList: true,
        subtree: true
    });

}

</script>

</body>
</html>
